<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MoM Pro — Minutes of Meeting Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3ef;--bg2:#ffffff;--bg3:#eceae4;--sf:#ffffff;--br:#e0ddd5;--br2:#ccc9be;--tx:#1a1916;--t2:#6b6860;--t3:#9b9890;--ac:#2563eb;--al:#dbeafe;--ok:#16a34a;--ol:#dcfce7;--wn:#d97706;--wl:#fef3c7;--er:#dc2626;--el:#fee2e2;--in:#7c3aed;--il:#ede9fe;--sh:0 1px 3px rgba(0,0,0,.08);--r:10px;--rs:6px;--sw:220px;--fn:'DM Sans',sans-serif;--mo:'DM Mono',monospace}
[data-theme=dark]{--bg:#141210;--bg2:#1e1c1a;--bg3:#2a2825;--sf:#252320;--br:#3a3835;--br2:#4a4845;--tx:#f0ede6;--t2:#a09d96;--t3:#6b6860;--ac:#3b82f6;--al:#1e3a5f;--ok:#22c55e;--ol:#14291e;--wn:#f59e0b;--wl:#2a1f0a;--er:#f87171;--el:#2a1010;--in:#a78bfa;--il:#2a1f4a}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;transition:background .2s,color .2s}
.app{display:flex;height:100vh;overflow:hidden}
/* ── Sidebar ── */
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--br);display:flex;flex-direction:column;height:100vh;overflow-y:auto;flex-shrink:0;transition:width .2s}
.sidebar.collapsed{width:0;overflow:hidden}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--br);white-space:nowrap}
.sb-logo .lm{font-size:17px;font-weight:600;letter-spacing:-.5px}
.sb-logo .ls{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;min-width:204px}
.nl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin:12px 0 5px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);cursor:pointer;color:var(--t2);font-size:13px;transition:all .15s;margin-bottom:2px;white-space:nowrap}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{background:var(--al);color:var(--ac);font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nb{margin-left:auto;background:var(--er);color:#fff;font-size:10px;font-weight:600;padding:1px 5px;border-radius:8px}
.sb-footer{padding:12px 14px;border-top:1px solid var(--br);min-width:204px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--br);padding:10px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar .tt{font-size:15px;font-weight:600;flex:1}
.content{flex:1;padding:22px;overflow-y:auto}
/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--br2);background:var(--bg2);color:var(--tx);transition:all .15s;font-family:var(--fn);white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn:active{transform:scale(.98)}
.bp{background:var(--ac);color:#fff;border-color:var(--ac)}.bp:hover{background:#1d4ed8}
.bok{background:var(--ok);color:#fff;border-color:var(--ok)}.bok:hover{background:#15803d}
.ber{background:var(--er);color:#fff;border-color:var(--er)}
.bs{padding:4px 9px;font-size:12px}
/* ── Cards ── */
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ctit{font-size:14px;font-weight:600}
/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* ── Stat cards ── */
.sc{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px 18px}
.sl-{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}
.sv{font-size:26px;font-weight:600;letter-spacing:-1px}
.sc2{font-size:11px;color:var(--t3);margin-top:3px}
.sbar{height:3px;border-radius:2px;background:var(--bg3);margin-top:10px;overflow:hidden}
.sbf{height:100%;border-radius:2px}
/* ── Table ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-bottom:1px solid var(--br)}
td{padding:10px 11px;border-bottom:1px solid var(--br);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
/* ── Badges ── */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.b-ok{background:var(--ol);color:var(--ok)}.b-wn{background:var(--wl);color:var(--wn)}.b-er{background:var(--el);color:var(--er)}.b-in{background:var(--il);color:var(--in)}.b-df{background:var(--bg3);color:var(--t2)}
/* ── Progress ── */
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px}
/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.fg label{font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.2px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
input,select,textarea{width:100%;padding:7px 11px;border:1px solid var(--br2);border-radius:var(--rs);font-size:13px;background:var(--bg2);color:var(--tx);font-family:var(--fn);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:72px}
/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--br);margin-bottom:18px}
.tab{padding:8px 15px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
/* ── Divider ── */
.divl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);padding:0 0 7px;border-bottom:1px solid var(--br);margin-bottom:14px}
/* ── Timeline ── */
.tl{position:relative;padding-left:22px}.tl::before{content:'';position:absolute;left:6px;top:6px;bottom:0;width:1px;background:var(--br)}
.tli{position:relative;margin-bottom:14px}.tld{position:absolute;left:-19px;top:3px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2)}.tlt{font-size:11px;color:var(--t3)}.tlx{font-size:13px;margin-top:1px}
/* ── Toggle ── */
.tgl{width:34px;height:19px;background:var(--br2);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block}
.tgl.on{background:var(--ac)}.tgl::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:transform .2s}.tgl.on::after{transform:translateX(15px)}
/* ── Tags ── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px 2px 3px;background:var(--bg3);border:1px solid var(--br);border-radius:20px;font-size:11px;color:var(--t2)}
/* ── Upload zone ── */
.upzone{border:2px dashed var(--br2);border-radius:var(--r);padding:30px;text-align:center;cursor:pointer;transition:all .15s}
.upzone:hover{border-color:var(--ac);background:var(--al)}
/* ── Notif dot ── */
.ndot{width:8px;height:8px;border-radius:50%;background:var(--er);flex-shrink:0}
/* ── Chip ── */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid var(--br2);background:var(--bg2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover,.chip.on{background:var(--al);border-color:var(--ac);color:var(--ac)}
/* ── Alert ── */
.alert{padding:9px 13px;border-radius:var(--rs);font-size:13px;display:flex;align-items:center;gap:8px;border:1px solid}
.aw{background:var(--wl);color:var(--wn);border-color:var(--wn)}.ad{background:var(--el);color:var(--er);border-color:var(--er)}.ai{background:var(--al);color:var(--ac);border-color:var(--ac)}
/* ── Toast ── */
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;display:none;pointer-events:none}
/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--br);border-radius:14px;width:660px;max-width:95vw;max-height:88vh;overflow-y:auto}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.mt{font-size:15px;font-weight:600}
.mx{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);border:1px solid var(--br);background:none;font-size:15px;transition:all .15s}
.mx:hover{background:var(--bg3);color:var(--tx)}
.mb{padding:18px 22px}.mf{padding:14px 22px;border-top:1px solid var(--br);display:flex;gap:9px;justify-content:flex-end}
/* ── Code block ── */
.code{background:var(--bg3);border:1px solid var(--br2);border-radius:var(--rs);padding:12px 14px;font-family:var(--mo);font-size:11px;color:var(--t2);overflow-x:auto;line-height:1.6}
/* ── Print preview ── */
.pp{background:#fff;border:1px solid #e0ddd5;border-radius:var(--r);padding:28px 32px;font-family:'DM Sans',sans-serif;color:#1a1916;max-width:580px;margin:0 auto}
.pph{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1a1916;padding-bottom:12px;margin-bottom:16px}
.pplogo{font-size:17px;font-weight:700}
.ppmeta{font-size:11px;text-align:right;color:#6b6860;line-height:1.8}
.pps{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#9b9890;border-bottom:1px solid #e0ddd5;padding-bottom:5px;margin:14px 0 9px}
.pptable{width:100%;border-collapse:collapse;font-size:11px}
.pptable th{background:#f4f3ef;padding:6px 9px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;color:#9b9890}
.pptable td{padding:7px 9px;border-bottom:1px solid #f4f3ef}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
/* ── Responsive ── */
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.sidebar{display:none}.g2,.g3{grid-template-columns:1fr}.fgrid{grid-template-columns:1fr}}
</style>
</head>

function gu(id){return USERS.find(u=>u.id===id)||{ini:'?',col:'#eee',tc:'#666',name:'Unknown',dept:'',email:''}}
function av(u,sz=28){return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px;background:${u.col};color:${u.tc};">${u.ini}</div>`}
function sb(s){const m={completed:'b-ok','in-progress':'b-in',overdue:'b-er',pending:'b-df',active:'b-ok'};const l={completed:'Completed','in-progress':'In Progress',overdue:'Overdue',pending:'Pending',active:'Active'};return`<span class="bdg ${m[s]||'b-df'}">${l[s]||s}</span>`}
function pb(p){return`<span class="bdg ${p==='high'?'b-er':p==='medium'?'b-wn':'b-df'}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`}
function eb(l){if(!l)return'<span class="bdg b-df">None</span>';const c=['','b-wn','b-er','b-in'];const lb=['','L1 — Manager','L2 — Dept Head','L3 — Executive'];return`<span class="bdg ${c[l]||'b-er'}">${lb[l]||'L'+l}</span>`}
function ma(u){return`<span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;">${av(u,20)}&nbsp;${u.name}</span>`}
function donut(vals,colors,cx,r){
  const tot=vals.reduce((a,b)=>a+b,0);if(!tot)return'';
  let ang=-Math.PI/2,parts=[];
  vals.forEach((v,i)=>{if(!v)return;const a=(v/tot)*Math.PI*2;const x1=cx+r*Math.cos(ang),y1=cx+r*Math.sin(ang);ang+=a;const x2=cx+r*Math.cos(ang),y2=cx+r*Math.sin(ang);parts.push(`<path d="M${cx},${cx} L${x1},${y1} A${r},${r} 0 ${a>Math.PI?1:0},1 ${x2},${y2} Z" fill="${colors[i]}" opacity=".9"/>`)});
  return parts.join('')+`<circle cx="${cx}" cy="${cx}" r="${r*.55}" fill="var(--sf)"/>`;
}

function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  const bg={info:'var(--il)',ok:'var(--ol)',warn:'var(--wl)',err:'var(--el)'};
  const tc={info:'var(--in)',ok:'var(--ok)',warn:'var(--wn)',err:'var(--er)'};
  t.innerHTML=`<div style="background:${bg[type]};color:${tc[type]};border:1px solid ${tc[type]};border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.12);max-width:320px;">${msg}</div>`;
  t.style.display='block';setTimeout(()=>t.style.display='none',3400);
}

function openModal(type,data){

}

      </div>
    </div>
    <div class="tw" id="audit-table">${auditTable(AUDIT_LOG)}</div>

function auditTable(data){
  const cols={escalation:'var(--el)',update:'var(--al)',notification:'var(--wl)',import:'var(--ol)',create:'var(--il)',config:'var(--bg3)'};
  const tcols={escalation:'var(--er)',update:'var(--ac)',notification:'var(--wn)',import:'var(--ok)',create:'var(--in)',config:'var(--t2)'};
  return`<table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th><th>Type</th></tr></thead><tbody>
  ${data.map(a=>`<tr><td style="font-family:var(--mo);font-size:11px;white-space:nowrap;">${a.time}</td><td style="font-size:12px;">${a.user}</td><td style="font-size:12px;">${a.action}</td><td><span style="font-family:var(--mo);font-size:10px;color:var(--ac);">${a.entity}</span></td><td><span class="bdg" style="background:${cols[a.type]||'var(--bg3)'};color:${tcols[a.type]||'var(--t2)'};">${a.type}</span></td></tr>`).join('')}</tbody></table>`;
}
function filterAudit(type,el){
  document.querySelectorAll('#audit-chips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');
  document.getElementById('audit-table').innerHTML=auditTable(type==='all'?AUDIT_LOG:AUDIT_LOG.filter(a=>a.type===type));
}

    <div class="fg"><label>STATUS</label><select id="tm-status"><option ${t.status==='pending'?'selected':''} value="pending">pending</option><option ${t.status==='in-progress'?'selected':''} value="in-progress">in-progress</option><option ${t.status==='completed'?'selected':''} value="completed">completed</option><option ${t.status==='overdue'?'selected':''} value="overdue">overdue</option></select></div>
    <div class="fg"><label>ESCALATION LEVEL</label><select id="tm-esc"><option value="0" ${!t.esc?'selected':''}>None</option><option value="1" ${t.esc===1?'selected':''}>L1 — Manager</option><option value="2" ${t.esc===2?'selected':''}>L2 — Dept Head</option><option value="3" ${t.esc===3?'selected':''}>L3 — Executive</option></select></div>
    <div class="fg full"><label>PROGRESS (${t.pct}%)</label><input type="range" min="0" max="100" step="1" value="${t.pct}" id="tm-pct" oninput="this.previousElementSibling.textContent='PROGRESS ('+this.value+'%)'"><span style="font-size:11px;color:var(--t3);">${t.pct}%</span></div>
    <div class="fg full"><label>NOTES</label><textarea id="tm-notes">${t.notes}</textarea></div>
  </div>
  <div class="divl">Comments (${cmts.length})</div>
  ${cmts.map(c=>{const cu=gu(c.uid);return`<div style="background:var(--bg3);border-radius:7px;padding:9px 11px;margin-bottom:8px;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">${av(cu,18)}<span style="font-size:12px;font-weight:500;">${cu.name}</span><span style="font-size:10px;color:var(--t3);margin-left:4px;">${c.time}</span></div><div style="font-size:12px;">${c.text.replace(/@(\w+)/g,'<span style="color:var(--ac);font-weight:500;">@$1</span>')}</div></div>`}).join('')||'<div style="color:var(--t3);font-size:12px;margin-bottom:12px;">No comments yet.</div>'}
  <textarea id="new-cmt" placeholder="Add a comment…" style="margin-top:4px;"></textarea>`;
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn bp" onclick="saveTask('${taskId}')">Save & Notify</button>`;
}

function saveTask(id){
  const t=TASKS.find(x=>x.id===id);
  if(t){
    t.title=document.getElementById('tm-title')?.value||t.title;
    t.status=document.getElementById('tm-status')?.value||t.status;
    t.esc=parseInt(document.getElementById('tm-esc')?.value||0);
    t.pct=parseInt(document.getElementById('tm-pct')?.value||t.pct);
    t.notes=document.getElementById('tm-notes')?.value||t.notes;
    const cmt=document.getElementById('new-cmt')?.value?.trim();
    if(cmt){if(!COMMENTS[id])COMMENTS[id]=[];COMMENTS[id].push({uid:1,time:'Just now',text:cmt});}
  }
  showToast('Task updated. Assignee notified via Office 365.','ok');
  closeModal();
}

function renderMeetingDetailModal(meetingId){
  const m=MEETINGS.find(x=>x.id===meetingId);
  if(!m)return;
  const mt=TASKS.filter(t=>t.mid===meetingId);
  const att=m.attendees.map(id=>gu(id));
  document.getElementById('modal-title').textContent=`MoM — ${m.no}`;
  document.getElementById('modal-body').innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;">
    <div><div style="font-size:10px;color:var(--t3);margin-bottom:3px;">MEETING NO</div><div style="font-family:var(--mo);font-weight:600;color:var(--ac);">${m.no}</div></div>
    <div><div style="font-size:10px;color:var(--t3);margin-bottom:3px;">DATE</div><div style="font-weight:500;">${m.date}</div></div>
    <div><div style="font-size:10px;color:var(--t3);margin-bottom:3px;">VENUE</div><div style="font-weight:500;">${m.venue}</div></div>
  </div>
  <div class="divl">Attendees</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">${att.map(u=>`<span class="tag">${av(u,18)}&nbsp;${u.name}</span>`).join('')}</div>
  <div class="divl">Action Items</div>
  <table style="font-size:12px;"><thead><tr><th>#</th><th>Task</th><th>Assignee</th><th>Due</th><th>Status</th><th>Escalation</th></tr></thead>
  <tbody>${mt.map((t,i)=>{const u=gu(t.uid);return`<tr><td>${i+1}</td><td>${t.title}</td><td>${ma(u)}</td><td>${t.due}</td><td>${sb(t.status)}</td><td>${eb(t.esc)}</td></tr>`}).join('')}</tbody></table>`;
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn" onclick="closeModal()">Close</button>
    <button class="btn" onclick="closeModal();showToast('MoM emailed to all attendees','ok')">Email MoM</button>
    <button class="btn bp" onclick="closeModal();showToast('PDF export started','ok')">Export PDF</button>`;
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
buildNav();
navigate('dashboard');
</script>
